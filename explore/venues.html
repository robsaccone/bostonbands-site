<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZV7S4L4S5J"></script>
<script>
  window.dataLayer = window.dataLayer || [];

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venue Map — BostonBands Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
:root {
  --black: #050505;
  --surface-2: #111111;
  --surface-3: #1a1a1a;
  --surface-4: #222222;
  --text-dim: #777777;
  --text-muted: #999999;
  --text-body: #c0c0c0;
  --text-bright: #e8e8e8;
  --white: #f5f5f0;
  --amber: #d4a03a;
  --amber-glow: #e8b84a;
  --amber-dim: #8a6a2a;
  --font-display: 'Archivo Black', sans-serif;
  --font-condensed: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}
html { overflow-x: hidden; -webkit-text-size-adjust: 100%; }
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body);
  font-weight: 300;
  color: var(--text-body);
  background: var(--black);
  overflow: hidden;
  height: 100vh;
}
a { color: var(--amber); text-decoration: none; }
a:hover { color: var(--amber-glow); }

.page-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  padding: 1rem 1.5rem;
  background: rgba(5,5,5,0.92);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--surface-3);
}
.page-title {
  font-family: var(--font-display);
  font-size: 1rem;
  color: var(--white);
  letter-spacing: 0.02em;
}
.page-title span { color: var(--amber); }
.page-back {
  font-family: var(--font-condensed);
  font-weight: 600;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.page-back:hover { color: var(--amber); }

#map {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 1;
}

.explainer-card {
  position: fixed;
  bottom: 3rem;
  left: 1.5rem;
  z-index: 1000;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid var(--surface-4);
  border-radius: 4px;
  padding: 1.25rem 1.5rem;
  max-width: 280px;
}
.explainer-title {
  font-family: var(--font-condensed);
  font-weight: 700;
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 0.5rem;
}
.explainer-card p {
  font-size: 0.8rem;
  line-height: 1.5;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
}
.explainer-hint {
  font-family: var(--font-condensed);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--text-dim);
}
@media (max-width: 600px) {
  .explainer-card { display: none; }
}

/* Override Leaflet popup styles */
.leaflet-popup-content-wrapper {
  background: var(--surface-2);
  color: var(--text-body);
  border-radius: 4px;
  border: 1px solid var(--surface-4);
  box-shadow: 0 8px 30px rgba(0,0,0,0.6);
}
.leaflet-popup-tip { background: var(--surface-2); }
.leaflet-popup-content {
  margin: 12px 16px;
  font-family: var(--font-body);
  font-size: 0.85rem;
  line-height: 1.5;
}
.popup-name {
  font-family: var(--font-condensed);
  font-weight: 700;
  font-size: 1rem;
  color: var(--white);
  margin-bottom: 0.25rem;
}
.popup-city {
  color: var(--text-muted);
  font-size: 0.8rem;
  margin-bottom: 0.5rem;
}
.popup-stat {
  color: var(--amber);
  font-family: var(--font-condensed);
  font-weight: 600;
  font-size: 0.85rem;
}
.popup-dates {
  color: var(--text-dim);
  font-size: 0.75rem;
  margin-top: 0.2rem;
}

/* Override cluster styles */
.marker-cluster-small,
.marker-cluster-medium,
.marker-cluster-large {
  background: rgba(212,160,58,0.2) !important;
}
.marker-cluster-small div,
.marker-cluster-medium div,
.marker-cluster-large div {
  background: rgba(212,160,58,0.6) !important;
  color: var(--white) !important;
  font-family: var(--font-condensed) !important;
  font-weight: 700 !important;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="explainer-card">
  <div class="explainer-title">Venue Map</div>
  <p>Every bar, club, coffee shop, and basement that hosted a show. Zoom in on your neighborhood&mdash;you might recognize a few.</p>
  <div class="explainer-hint">Tap any dot to see the venue</div>
</div>

<header class="page-header">
  <div class="page-title">Venue <span>Map</span></div>
  <a href="../index.html#explore" class="page-back">&larr; Back</a>
</header>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
(function() {
  const map = L.map('map', {
    center: [42.36, -71.06],
    zoom: 11,
    zoomControl: false,
    attributionControl: false
  });

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);

  const markers = L.markerClusterGroup({
    maxClusterRadius: 40,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false
  });

  fetch('../data/venue-map.geojson')
    .then(r => r.json())
    .then(geojson => {
      const maxGigs = Math.max(...geojson.features.map(f => f.properties.gig_count || 0));

      geojson.features.forEach(f => {
        const p = f.properties;
        const gigs = p.gig_count || 0;
        const coords = f.geometry.coordinates;

        // Size: 4-14px based on gig count (log scale)
        const size = gigs > 0 ? Math.max(4, Math.min(14, 4 + Math.log(gigs) * 1.5)) : 4;
        // Opacity: more gigs = more opaque
        const opacity = gigs > 0 ? Math.max(0.4, Math.min(1, 0.4 + (gigs / maxGigs) * 0.6)) : 0.4;

        const marker = L.circleMarker([coords[1], coords[0]], {
          radius: size,
          fillColor: '#d4a03a',
          fillOpacity: opacity,
          color: '#e8b84a',
          weight: 1,
          opacity: opacity * 0.6
        });

        const dates = p.first_gig && p.last_gig
          ? `<div class="popup-dates">${p.first_gig.slice(0,4)} &ndash; ${p.last_gig.slice(0,4)}</div>`
          : '';
        const city = [p.city, p.state].filter(Boolean).join(', ');

        marker.bindPopup(`
          <div class="popup-name">${p.name}</div>
          <div class="popup-city">${city}${p.address ? '<br>' + p.address : ''}</div>
          <div class="popup-stat">${gigs.toLocaleString()} gigs</div>
          ${dates}
        `, { closeButton: false });

        markers.addLayer(marker);
      });

      map.addLayer(markers);
    });
})();
</script>
</body>
</html>
