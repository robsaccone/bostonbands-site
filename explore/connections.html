<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Universe — BostonBands Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #050505;
  --surface-2: #111111;
  --surface-3: #1a1a1a;
  --surface-4: #222222;
  --text-dim: #777777;
  --text-muted: #999999;
  --text-body: #c0c0c0;
  --text-bright: #e8e8e8;
  --white: #f5f5f0;
  --amber: #d4a03a;
  --amber-glow: #e8b84a;
  --amber-dim: #8a6a2a;
  --blue: #0972a5;
  --blue-bright: #1a9fd4;
  --font-display: 'Archivo Black', sans-serif;
  --font-condensed: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body);
  font-weight: 300;
  color: var(--text-body);
  background: var(--black);
  overflow: hidden;
  height: 100vh;
}
a { color: var(--amber); text-decoration: none; }
a:hover { color: var(--amber-glow); }

.page-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  padding: 1rem 1.5rem;
  background: rgba(5,5,5,0.92);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--surface-3);
}
.page-title {
  font-family: var(--font-display);
  font-size: 1rem;
  color: var(--white);
}
.page-title span { color: var(--amber); }
.page-back {
  font-family: var(--font-condensed);
  font-weight: 600;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.page-back:hover { color: var(--amber); }

.page-subtitle {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  font-family: var(--font-condensed);
  font-weight: 600;
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-align: center;
  pointer-events: none;
}

#tooltip {
  position: fixed;
  pointer-events: none;
  background: var(--surface-2);
  border: 1px solid var(--surface-4);
  border-radius: 4px;
  padding: 8px 12px;
  font-size: 0.8rem;
  color: var(--text-body);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 2000;
  white-space: nowrap;
}
#tooltip .tt-name {
  font-family: var(--font-condensed);
  font-weight: 700;
  color: var(--white);
  font-size: 0.9rem;
}
#tooltip .tt-stat {
  color: var(--amber);
  font-family: var(--font-condensed);
  font-weight: 600;
}

.explainer-card {
  position: fixed;
  bottom: 3rem;
  left: 1.5rem;
  z-index: 1000;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid var(--surface-4);
  border-radius: 4px;
  padding: 1.25rem 1.5rem;
  max-width: 280px;
}
.explainer-title {
  font-family: var(--font-condensed);
  font-weight: 700;
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 0.5rem;
}
.explainer-card p {
  font-size: 0.8rem;
  line-height: 1.5;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
}
.explainer-hint {
  font-family: var(--font-condensed);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--text-dim);
}
@media (max-width: 600px) {
  .explainer-card { display: none; }
}

svg { display: block; }
</style>
</head>
<body>

<header class="page-header">
  <div class="page-title">The <span>Universe</span></div>
  <a href="../index.html#explore" class="page-back">&larr; Back</a>
</header>

<div class="page-subtitle">Boston's local music universe</div>

<div class="explainer-card" id="explainer">
  <div class="explainer-title">The Universe</div>
  <p>If two venues booked the same bands, they're connected here. The bigger the circle, the more it connects to. No surprise who's at the center.</p>
  <div class="explainer-hint">Hover to explore &middot; Drag to rearrange &middot; <span style="color:#6b2020;">Faded = closed</span></div>
</div>

<div id="tooltip"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(function() {
  const width = window.innerWidth;
  const height = window.innerHeight;

  const svg = d3.select('body').append('svg')
    .attr('width', width)
    .attr('height', height);

  const tooltip = document.getElementById('tooltip');

  fetch('../data/venue-network.json')
    .then(r => r.json())
    .then(data => {
      // Calculate node degrees for sizing
      const degree = {};
      data.links.forEach(l => {
        degree[l.source] = (degree[l.source] || 0) + l.shared_bands;
        degree[l.target] = (degree[l.target] || 0) + l.shared_bands;
      });
      const maxDegree = Math.max(...Object.values(degree));

      const simulation = d3.forceSimulation(data.nodes)
        .force('link', d3.forceLink(data.links)
          .id(d => d.id)
          .distance(d => 300 - Math.min(d.shared_bands * 0.3, 150))
        )
        .force('charge', d3.forceManyBody().strength(-1200))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 15))
        .force('x', d3.forceX(width / 2).strength(0.03))
        .force('y', d3.forceY(height / 2).strength(0.03));

      function nodeRadius(d) {
        const deg = degree[d.id] || 1;
        return Math.max(10, Math.min(50, 10 + (deg / maxDegree) * 40));
      }

      // Links
      const link = svg.append('g')
        .selectAll('line')
        .data(data.links)
        .join('line')
        .attr('stroke', '#1a1a1a')
        .attr('stroke-width', d => Math.max(1, Math.min(6, d.shared_bands / 80)));

      // Glow filter for Middle East
      const defs = svg.append('defs');
      const filter = defs.append('filter').attr('id', 'glow');
      filter.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'blur');
      filter.append('feMerge').selectAll('feMergeNode')
        .data(['blur', 'SourceGraphic'])
        .join('feMergeNode')
        .attr('in', d => d);

      const isMiddleEast = d => d.id.toLowerCase().includes('middle east');
      const isClosed = d => d.closed != null;

      // Nodes
      const node = svg.append('g')
        .selectAll('circle')
        .data(data.nodes)
        .join('circle')
        .attr('r', d => nodeRadius(d))
        .attr('fill', d => isClosed(d) ? '#555' : (isMiddleEast(d) ? '#e8b84a' : '#d4a03a'))
        .attr('fill-opacity', d => isClosed(d) ? 0.4 : (isMiddleEast(d) ? 0.9 : 0.7))
        .attr('stroke', d => isClosed(d) ? '#6b2020' : '#e8b84a')
        .attr('stroke-width', d => isMiddleEast(d) ? 2 : 1)
        .attr('stroke-opacity', d => isClosed(d) ? 0.6 : (isMiddleEast(d) ? 0.6 : 0.3))
        .attr('stroke-dasharray', d => isClosed(d) ? '3,2' : null)
        .attr('filter', d => isMiddleEast(d) ? 'url(#glow)' : null)
        .style('cursor', 'pointer')
        .call(d3.drag()
          .on('start', dragstarted)
          .on('drag', dragged)
          .on('end', dragended));

      // Labels
      const label = svg.append('g')
        .selectAll('text')
        .data(data.nodes)
        .join('text')
        .text(d => d.id)
        .attr('font-family', "'Barlow Condensed', sans-serif")
        .attr('font-weight', 600)
        .attr('font-size', d => {
          const r = nodeRadius(d);
          return r > 20 ? '11px' : '9px';
        })
        .attr('fill', d => isClosed(d) ? '#777' : (isMiddleEast(d) ? '#e8b84a' : '#e8e8e8'))
        .attr('fill-opacity', d => isClosed(d) ? 0.5 : (isMiddleEast(d) ? 1 : (nodeRadius(d) > 15 ? 0.9 : 0.5)))
        .attr('text-anchor', 'middle')
        .attr('dy', d => nodeRadius(d) + 14)
        .style('pointer-events', 'none');

      // Hover interactions
      node.on('mouseover', function(event, d) {
        const connected = new Set();
        data.links.forEach(l => {
          const src = typeof l.source === 'object' ? l.source.id : l.source;
          const tgt = typeof l.target === 'object' ? l.target.id : l.target;
          if (src === d.id) connected.add(tgt);
          if (tgt === d.id) connected.add(src);
        });
        connected.add(d.id);

        node.attr('fill-opacity', n => connected.has(n.id) ? 1 : 0.1)
            .attr('stroke-opacity', n => connected.has(n.id) ? 0.8 : 0.05);
        link.attr('stroke', l => {
          const src = typeof l.source === 'object' ? l.source.id : l.source;
          const tgt = typeof l.target === 'object' ? l.target.id : l.target;
          return (src === d.id || tgt === d.id) ? '#d4a03a' : '#0a0a0a';
        }).attr('stroke-opacity', l => {
          const src = typeof l.source === 'object' ? l.source.id : l.source;
          const tgt = typeof l.target === 'object' ? l.target.id : l.target;
          return (src === d.id || tgt === d.id) ? 0.8 : 0.1;
        });
        label.attr('fill-opacity', n => connected.has(n.id) ? 1 : 0.1);

        // Tooltip
        const connections = data.links.filter(l => {
          const src = typeof l.source === 'object' ? l.source.id : l.source;
          const tgt = typeof l.target === 'object' ? l.target.id : l.target;
          return src === d.id || tgt === d.id;
        }).length;

        const closedLabel = d.closed ? `<div class="tt-stat" style="color:#6b2020;">Closed ${d.closed}</div>` : '';
        tooltip.innerHTML = `
          <div class="tt-name">${d.id}</div>
          <div class="tt-stat">${connections} connected venues</div>
          ${closedLabel}
        `;
        tooltip.style.opacity = 1;
      })
      .on('mousemove', function(event) {
        tooltip.style.left = (event.clientX + 16) + 'px';
        tooltip.style.top = (event.clientY - 10) + 'px';
      })
      .on('mouseout', function() {
        node.attr('fill-opacity', d => isClosed(d) ? 0.4 : 0.7)
            .attr('stroke-opacity', d => isClosed(d) ? 0.6 : 0.3);
        link.attr('stroke', '#1a1a1a').attr('stroke-opacity', 1);
        label.attr('fill-opacity', d => isClosed(d) ? 0.5 : (nodeRadius(d) > 15 ? 0.9 : 0.5));
        tooltip.style.opacity = 0;
      });

      simulation.on('tick', () => {
        link
          .attr('x1', d => d.source.x)
          .attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x)
          .attr('y2', d => d.target.y);
        node
          .attr('cx', d => d.x)
          .attr('cy', d => d.y);
        label
          .attr('x', d => d.x)
          .attr('y', d => d.y);
      });

      function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
      }
      function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
      }
      function dragended(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
      }
    });
})();
</script>
</body>
</html>
