<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BostonBands Radio — BostonBands Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #050505;
  --surface-1: #0a0a0a;
  --surface-2: #111111;
  --surface-3: #1a1a1a;
  --surface-4: #222222;
  --text-dim: #777777;
  --text-muted: #999999;
  --text-body: #c0c0c0;
  --text-bright: #e8e8e8;
  --white: #f5f5f0;
  --amber: #d4a03a;
  --amber-glow: #e8b84a;
  --amber-dim: #8a6a2a;
  --font-display: 'Archivo Black', sans-serif;
  --font-condensed: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body);
  font-weight: 300;
  color: var(--text-body);
  background: var(--black);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
a { color: var(--amber); text-decoration: none; }
a:hover { color: var(--amber-glow); }

.page-header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 1rem 1.5rem;
  background: rgba(5,5,5,0.95);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--surface-3);
}
.page-title {
  font-family: var(--font-display);
  font-size: 1rem;
  color: var(--white);
}
.page-title span { color: var(--amber); }
.page-back {
  font-family: var(--font-condensed);
  font-weight: 600;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.page-back:hover { color: var(--amber); }

/* Now Playing */
.now-playing {
  max-width: 600px;
  margin: 3rem auto 2rem;
  padding: 0 1.5rem;
  text-align: center;
}
.np-photo {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  margin: 0 auto 1.25rem;
  background: var(--surface-2);
  background-size: cover;
  background-position: center;
  border: 2px solid var(--surface-4);
  transition: background-image 0.3s;
}
.np-photo.has-photo {
  border-color: var(--amber-dim);
  box-shadow: 0 0 30px rgba(212,160,58,0.1);
}
.np-label {
  font-family: var(--font-condensed);
  font-weight: 600;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--amber-dim);
  margin-bottom: 0.75rem;
}
.np-title {
  font-family: var(--font-display);
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  color: var(--white);
  margin-bottom: 0.25rem;
}
.np-artist {
  font-family: var(--font-condensed);
  font-weight: 600;
  font-size: 1rem;
  color: var(--amber);
  letter-spacing: 0.05em;
}

/* Controls */
.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 1.5rem;
  margin: 2rem auto;
}
.btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 1.2rem;
  padding: 0.5rem;
  transition: color 0.2s;
  font-family: var(--font-body);
}
.btn:hover { color: var(--white); }
.btn-play {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--amber);
  color: var(--black);
  font-size: 1.4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.15s;
}
.btn-play:hover {
  background: var(--amber-glow);
  transform: scale(1.05);
}
.btn-play .icon { margin-left: 2px; }

/* Progress */
.progress-wrap {
  max-width: 500px;
  margin: 0 auto 0.5rem;
  padding: 0 1.5rem;
}
.progress-bar {
  width: 100%;
  height: 4px;
  background: var(--surface-4);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: var(--amber);
  border-radius: 2px;
  width: 0%;
  transition: width 0.1s linear;
}
.progress-times {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-condensed);
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 0.3rem;
  padding: 0 1.5rem;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

/* Shuffle indicator */
.shuffle-active { color: var(--amber) !important; }

/* Tracklist */
.tracklist-wrap {
  max-width: 600px;
  margin: 3rem auto 4rem;
  padding: 0 1.5rem;
}
.tracklist-label {
  font-family: var(--font-condensed);
  font-weight: 700;
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 1rem;
}
.track {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 0.75rem;
  border-bottom: 1px solid var(--surface-3);
  cursor: pointer;
  transition: background 0.2s;
  border-radius: 2px;
}
.track:hover { background: var(--surface-2); }
.track.active {
  background: var(--surface-2);
  border-bottom-color: var(--amber-dim);
}
.track-num {
  font-family: var(--font-condensed);
  font-weight: 700;
  font-size: 0.75rem;
  color: var(--text-dim);
  width: 1.5rem;
  text-align: right;
  flex-shrink: 0;
}
.track.active .track-num { color: var(--amber); }
.track-info { flex: 1; min-width: 0; }
.track-title {
  font-size: 0.9rem;
  color: var(--text-bright);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.track-artist {
  font-size: 0.8rem;
  color: var(--text-dim);
}
.track.active .track-title { color: var(--amber-glow); }
</style>
</head>
<body>

<header class="page-header">
  <div class="page-title">BostonBands <span>Radio</span></div>
  <a href="../index.html#explore" class="page-back">&larr; Back</a>
</header>

<div class="now-playing">
  <div class="np-photo" id="npPhoto"></div>
  <div class="np-label">Now Playing</div>
  <div class="np-title" id="npTitle">Press play to start</div>
  <div class="np-artist" id="npArtist">&nbsp;</div>
</div>

<div class="controls">
  <button class="btn" id="btnShuffle" title="Shuffle">&#8645;</button>
  <button class="btn" id="btnPrev" title="Previous">&#9664;&#9664;</button>
  <button class="btn btn-play" id="btnPlay" title="Play"><span class="icon">&#9654;</span></button>
  <button class="btn" id="btnNext" title="Next">&#9654;&#9654;</button>
</div>

<div class="progress-wrap">
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>
<div class="progress-times">
  <span id="timeCurrent">0:00</span>
  <span id="timeDuration">0:00</span>
</div>

<div class="tracklist-wrap">
  <div class="tracklist-label">Playlist &middot; <span id="trackCount">0</span> tracks</div>
  <div id="tracklist"></div>
</div>

<audio id="audio" preload="none"></audio>

<script>
(function() {
  const audio = document.getElementById('audio');
  const btnPlay = document.getElementById('btnPlay');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const btnShuffle = document.getElementById('btnShuffle');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const timeCurrent = document.getElementById('timeCurrent');
  const timeDuration = document.getElementById('timeDuration');
  const npTitle = document.getElementById('npTitle');
  const npArtist = document.getElementById('npArtist');
  const npPhoto = document.getElementById('npPhoto');
  const tracklistEl = document.getElementById('tracklist');
  const trackCountEl = document.getElementById('trackCount');

  let tracks = [];
  let currentIndex = -1;
  let isShuffled = false;
  let playOrder = [];

  function formatTime(s) {
    if (isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
  }

  function buildPlayOrder() {
    playOrder = tracks.map((_, i) => i);
    if (isShuffled) {
      for (let i = playOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [playOrder[i], playOrder[j]] = [playOrder[j], playOrder[i]];
      }
    }
  }

  function loadTrack(index) {
    currentIndex = index;
    const t = tracks[index];
    audio.src = '../songs/' + t.file;
    npTitle.textContent = t.title === 'Untitled' ? t.artist : t.title;
    npArtist.textContent = t.title === 'Untitled' ? '' : t.artist;
    if (t.photo) {
      npPhoto.style.backgroundImage = `url(../songs/photos/${t.photo})`;
      npPhoto.classList.add('has-photo');
    } else {
      npPhoto.style.backgroundImage = '';
      npPhoto.classList.remove('has-photo');
    }
    progressFill.style.width = '0%';
    timeCurrent.textContent = '0:00';
    timeDuration.textContent = '0:00';
    // Highlight active track
    tracklistEl.querySelectorAll('.track').forEach((el, i) => {
      el.classList.toggle('active', i === index);
    });
  }

  function playTrack(index) {
    loadTrack(index);
    audio.play();
    btnPlay.querySelector('.icon').innerHTML = '&#10074;&#10074;';
  }

  function togglePlay() {
    if (currentIndex === -1) {
      playTrack(playOrder[0] ?? 0);
      return;
    }
    if (audio.paused) {
      audio.play();
      btnPlay.querySelector('.icon').innerHTML = '&#10074;&#10074;';
    } else {
      audio.pause();
      btnPlay.querySelector('.icon').innerHTML = '&#9654;';
    }
  }

  function nextTrack() {
    const orderIdx = playOrder.indexOf(currentIndex);
    const next = (orderIdx + 1) % playOrder.length;
    playTrack(playOrder[next]);
  }

  function prevTrack() {
    if (audio.currentTime > 3) {
      audio.currentTime = 0;
      return;
    }
    const orderIdx = playOrder.indexOf(currentIndex);
    const prev = (orderIdx - 1 + playOrder.length) % playOrder.length;
    playTrack(playOrder[prev]);
  }

  // Events
  btnPlay.addEventListener('click', togglePlay);
  btnNext.addEventListener('click', nextTrack);
  btnPrev.addEventListener('click', prevTrack);
  btnShuffle.addEventListener('click', () => {
    isShuffled = !isShuffled;
    btnShuffle.classList.toggle('shuffle-active', isShuffled);
    buildPlayOrder();
  });

  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      timeCurrent.textContent = formatTime(audio.currentTime);
    }
  });
  audio.addEventListener('loadedmetadata', () => {
    timeDuration.textContent = formatTime(audio.duration);
  });
  audio.addEventListener('ended', nextTrack);

  progressBar.addEventListener('click', (e) => {
    if (audio.duration) {
      const rect = progressBar.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    }
  });

  // Load playlist
  fetch('../data/playlist.json')
    .then(r => r.json())
    .then(data => {
      tracks = data;
      trackCountEl.textContent = tracks.length;
      buildPlayOrder();

      tracklistEl.innerHTML = tracks.map((t, i) => `
        <div class="track" data-index="${i}">
          <span class="track-num">${i + 1}</span>
          <div class="track-info">
            <div class="track-title">${t.title === 'Untitled' ? t.artist : t.title}</div>
            <div class="track-artist">${t.title === 'Untitled' ? t.genre : t.artist}</div>
          </div>
        </div>
      `).join('');

      tracklistEl.querySelectorAll('.track').forEach(el => {
        el.addEventListener('click', () => {
          playTrack(parseInt(el.dataset.index));
        });
      });
    });
})();
</script>
</body>
</html>
