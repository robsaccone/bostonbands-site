<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Timeline — BostonBands Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #050505;
  --surface-1: #0a0a0a;
  --surface-2: #111111;
  --surface-3: #1a1a1a;
  --surface-4: #222222;
  --text-dim: #777777;
  --text-muted: #999999;
  --text-body: #c0c0c0;
  --text-bright: #e8e8e8;
  --white: #f5f5f0;
  --amber: #d4a03a;
  --amber-glow: #e8b84a;
  --amber-dim: #8a6a2a;
  --font-display: 'Archivo Black', sans-serif;
  --font-condensed: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body);
  font-weight: 300;
  color: var(--text-body);
  background: var(--black);
  overflow: hidden;
  height: 100vh;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.03;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
a { color: var(--amber); text-decoration: none; }
a:hover { color: var(--amber-glow); }

/* === HEADER === */
.page-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  padding: 1rem 1.5rem;
  background: rgba(5,5,5,0.92);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--surface-3);
}
.page-title {
  font-family: var(--font-display);
  font-size: 1rem;
  color: var(--white);
}
.page-title span { color: var(--amber); }
.page-back {
  font-family: var(--font-condensed);
  font-weight: 600;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.page-back:hover { color: var(--amber); }

/* === NAV ARROWS (carousel-style, left/right edges) === */
.nav-arrow {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  z-index: 1000;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--surface-4);
  background: rgba(10,10,10,0.7);
  backdrop-filter: blur(8px);
  color: var(--text-dim);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.nav-arrow:hover {
  border-color: var(--amber-dim);
  color: var(--amber);
  background: rgba(10,10,10,0.9);
}
.nav-arrow--left { left: 1rem; }
.nav-arrow--right { right: 1rem; }

/* === SCROLL CONTAINER === */
.scroll-container {
  position: absolute;
  top: 52px;
  left: 0;
  right: 0;
  bottom: 0;
  overflow-x: scroll;
  overflow-y: hidden;
  scrollbar-color: var(--surface-4) var(--black);
}
.scroll-container::-webkit-scrollbar { height: 6px; }
.scroll-container::-webkit-scrollbar-track { background: var(--black); }
.scroll-container::-webkit-scrollbar-thumb { background: var(--surface-4); border-radius: 3px; }

.timeline-canvas {
  position: relative;
  height: 100%;
}

/* === SKYLINE SVG === */
.skyline-svg {
  position: absolute;
  bottom: 0;
  left: 0;
}

/* === ERA SPANS (top banner) === */
.era-span {
  position: absolute;
  top: 0;
  height: 32px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-bottom: 2px solid var(--amber-dim);
  border-left: 2px solid var(--amber-dim);
  opacity: 0;
  transition: opacity 0.5s var(--ease-out-expo);
}
.era-span.visible { opacity: 1; }
.era-span-label {
  font-family: var(--font-condensed);
  font-weight: 700;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--amber);
  white-space: nowrap;
}

/* === ERA CARDS (compact, image-driven) === */
.era-card {
  position: absolute;
  width: 320px;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid var(--surface-4);
  border-radius: 6px;
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.7s var(--ease-out-expo), transform 0.7s var(--ease-out-expo);
}
.era-card.visible {
  opacity: 1;
  transform: translateY(0);
}
.era-card-image {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  display: block;
  border-bottom: 1px solid var(--surface-4);
}
.era-card-image-placeholder {
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--surface-2);
  border-bottom: 1px solid var(--surface-4);
  display: flex;
  align-items: center;
  justify-content: center;
}
.era-card-image-placeholder span {
  font-family: var(--font-condensed);
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.era-card-body {
  padding: 0.75rem 1rem;
}
.era-card-year {
  font-family: var(--font-display);
  font-size: 1.3rem;
  color: var(--amber);
  line-height: 1;
  margin-bottom: 0.35rem;
}
.era-card-summary {
  font-size: 0.8rem;
  line-height: 1.6;
  color: var(--text-body);
}

/* === SCENE CARDS (interstitial images) === */
.scene-card {
  position: absolute;
  width: 240px;
  border-radius: 6px;
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.7s var(--ease-out-expo), transform 0.7s var(--ease-out-expo);
  border: 1px solid var(--surface-4);
}
.scene-card.visible {
  opacity: 1;
  transform: translateY(0);
}
.scene-card img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  display: block;
}
.scene-card-caption {
  background: rgba(10,10,10,0.9);
  padding: 0.4rem 0.6rem;
  font-family: var(--font-condensed);
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

/* === TOOLTIP === */
.bar-tooltip {
  position: fixed;
  z-index: 2000;
  background: var(--surface-3);
  border: 1px solid var(--amber-dim);
  border-radius: 4px;
  padding: 0.5rem 0.75rem;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  white-space: nowrap;
}
.bar-tooltip.visible { opacity: 1; }
.bar-tooltip-date {
  font-family: var(--font-condensed);
  font-weight: 700;
  color: var(--white);
  font-size: 0.85rem;
}
.bar-tooltip-stats {
  font-family: var(--font-condensed);
  font-weight: 600;
  color: var(--amber);
  font-size: 0.8rem;
}

/* === EXPLAINER CARD === */
.explainer-card {
  position: fixed;
  bottom: 1.5rem;
  left: 1.5rem;
  z-index: 1000;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid var(--surface-4);
  border-radius: 4px;
  padding: 1rem 1.25rem;
  max-width: 260px;
}
.explainer-title {
  font-family: var(--font-condensed);
  font-weight: 700;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 0.4rem;
}
.explainer-card p {
  font-size: 0.75rem;
  line-height: 1.5;
  color: var(--text-muted);
}

/* === MOBILE === */
@media (max-width: 768px) {
  .explainer-card { display: none; }
  .era-card { width: 260px; }
  .era-card-summary { font-size: 0.75rem; }
  .scene-card { width: 180px; }
  .nav-arrow { width: 36px; height: 36px; font-size: 1rem; }
  .nav-arrow--left { left: 0.5rem; }
  .nav-arrow--right { right: 0.5rem; }
}
</style>
</head>
<body>

<header class="page-header">
  <div class="page-title">The <span>Timeline</span></div>
  <a href="../index.html#explore" class="page-back">&larr; Back</a>
</header>

<div class="scroll-container" id="scrollContainer">
  <div class="timeline-canvas" id="timelineCanvas">
  </div>
</div>

<div class="bar-tooltip" id="tooltip">
  <div class="bar-tooltip-date"></div>
  <div class="bar-tooltip-stats"></div>
</div>

<div class="explainer-card">
  <div class="explainer-title">The Timeline</div>
  <p>Each bar is one month of gigs. Scroll to explore 30 years of Boston music.</p>
</div>

<button class="nav-arrow nav-arrow--left" id="navPrev" title="Previous era">&larr;</button>
<button class="nav-arrow nav-arrow--right" id="navNext" title="Next era">&rarr;</button>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(async function() {
  // --- Config ---
  const BAR_WIDTH = 18;
  const BAR_GAP = 2;
  const SKYLINE_RATIO = 0.30;
  const PADDING_LEFT = 60;
  const PADDING_RIGHT = 60;
  const ERA_SPAN_H = 32;

  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // --- Load data ---
  const [timelineData, erasData] = await Promise.all([
    d3.json('../data/timeline-extended.json'),
    d3.json('../data/eras.json')
  ]);

  // --- Build full month array (1996-01 through 2026-12) ---
  const dataMap = new Map();
  timelineData.forEach(d => dataMap.set(`${d.year}-${d.month}`, d));

  const allMonths = [];
  for (let y = 1996; y <= 2026; y++) {
    for (let m = 1; m <= 12; m++) {
      const key = `${y}-${m}`;
      allMonths.push(dataMap.get(key) || { year: y, month: m, gigs: 0, bands: 0, venues: 0 });
    }
  }

  // --- Dimensions ---
  const container = document.getElementById('scrollContainer');
  const viewportH = container.clientHeight;
  const skylineH = Math.round(viewportH * SKYLINE_RATIO);
  const canvasW = PADDING_LEFT + allMonths.length * (BAR_WIDTH + BAR_GAP) + PADDING_RIGHT;

  const canvas = document.getElementById('timelineCanvas');
  canvas.style.width = canvasW + 'px';

  // --- Scales ---
  const xScale = d3.scaleLinear()
    .domain([0, allMonths.length - 1])
    .range([PADDING_LEFT, canvasW - PADDING_RIGHT]);

  const maxGigs = d3.max(allMonths, d => d.gigs);
  const yScale = d3.scaleSqrt()
    .domain([0, maxGigs])
    .range([0, skylineH - 30]);

  // --- Helper: month index from year/month ---
  function monthIndex(year, month) {
    return (year - 1996) * 12 + (month - 1);
  }

  // --- Era end years (for span widths) ---
  const eraEndYears = [];
  for (let i = 0; i < erasData.length; i++) {
    eraEndYears.push(i < erasData.length - 1 ? erasData[i + 1].year : 2026);
  }

  // --- Era span banners (top) ---
  erasData.forEach((era, i) => {
    const startIdx = monthIndex(era.year, 1);
    const endIdx = monthIndex(eraEndYears[i], 1);
    const xStart = xScale(startIdx);
    const xEnd = xScale(endIdx);

    const span = document.createElement('div');
    span.className = 'era-span';
    span.style.left = xStart + 'px';
    span.style.width = (xEnd - xStart) + 'px';

    span.innerHTML = `<span class="era-span-label">${era.year} &mdash; ${era.title}</span>`;
    canvas.appendChild(span);
  });

  // --- Create SVG ---
  const svg = d3.select('#timelineCanvas').append('svg')
    .attr('class', 'skyline-svg')
    .attr('width', canvasW)
    .attr('height', skylineH);

  // --- Year separator lines & labels ---
  allMonths.forEach((d, i) => {
    if (d.month === 1) {
      const x = xScale(i);
      svg.append('line')
        .attr('x1', x).attr('y1', 0)
        .attr('x2', x).attr('y2', skylineH - 20)
        .attr('stroke', '#222')
        .attr('stroke-width', 0.5);
      svg.append('text')
        .attr('x', x + (BAR_WIDTH + BAR_GAP) * 6)
        .attr('y', skylineH - 6)
        .attr('text-anchor', 'middle')
        .attr('fill', '#d4a03a')
        .attr('font-family', 'Barlow Condensed, sans-serif')
        .attr('font-weight', '600')
        .attr('font-size', '11px')
        .attr('opacity', 0.7)
        .text(d.year);
    }
  });

  // --- Bar color/opacity helper ---
  function barStyle(gigs) {
    if (gigs === 0) return { color: '#8a6a2a', opacity: 0.3 };
    if (gigs <= 20) return { color: '#8a6a2a', opacity: 0.4 };
    if (gigs <= 100) return { color: '#d4a03a', opacity: 0.55 };
    if (gigs <= 300) return { color: '#d4a03a', opacity: 0.65 };
    if (gigs <= 700) return { color: '#e8b84a', opacity: 0.8 };
    return { color: '#e8b84a', opacity: 0.9 };
  }

  // --- SVG filter for glow ---
  const defs = svg.append('defs');
  const glowFilter = defs.append('filter').attr('id', 'barGlow');
  glowFilter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
  glowFilter.append('feComposite').attr('in', 'SourceGraphic').attr('in2', 'blur').attr('operator', 'over');

  // --- Render bars ---
  const bars = svg.selectAll('.bar')
    .data(allMonths)
    .enter()
    .append('rect')
    .attr('class', 'bar')
    .attr('x', (d, i) => xScale(i))
    .attr('y', d => skylineH - 20 - Math.max(yScale(d.gigs), 1))
    .attr('width', BAR_WIDTH)
    .attr('height', d => Math.max(yScale(d.gigs), 1))
    .attr('rx', 1)
    .attr('fill', d => barStyle(d.gigs).color)
    .attr('opacity', d => barStyle(d.gigs).opacity)
    .attr('filter', d => d.gigs > 700 ? 'url(#barGlow)' : null)
    .style('cursor', 'pointer');

  // --- Tooltip ---
  const tooltip = document.getElementById('tooltip');
  const tooltipDate = tooltip.querySelector('.bar-tooltip-date');
  const tooltipStats = tooltip.querySelector('.bar-tooltip-stats');

  bars.on('mouseenter', function(event, d) {
    const rect = this.getBoundingClientRect();
    tooltipDate.textContent = `${MONTH_NAMES[d.month - 1]} ${d.year}`;
    tooltipStats.textContent = `${d.gigs.toLocaleString()} gigs \u00B7 ${d.bands.toLocaleString()} bands \u00B7 ${d.venues.toLocaleString()} venues`;
    tooltip.style.left = (rect.left + rect.width / 2) + 'px';
    tooltip.style.top = (rect.top - 45) + 'px';
    tooltip.classList.add('visible');
    d3.select(this).attr('opacity', 1).attr('fill', '#e8b84a');
  })
  .on('mouseleave', function(event, d) {
    tooltip.classList.remove('visible');
    const style = barStyle(d.gigs);
    d3.select(this).attr('opacity', style.opacity).attr('fill', style.color);
  });

  // --- Mobile tap support ---
  let lastTapped = null;
  bars.on('touchstart', function(event, d) {
    event.preventDefault();
    if (lastTapped === this) {
      tooltip.classList.remove('visible');
      lastTapped = null;
      return;
    }
    lastTapped = this;
    const rect = this.getBoundingClientRect();
    tooltipDate.textContent = `${MONTH_NAMES[d.month - 1]} ${d.year}`;
    tooltipStats.textContent = `${d.gigs.toLocaleString()} gigs \u00B7 ${d.bands.toLocaleString()} bands \u00B7 ${d.venues.toLocaleString()} venues`;
    tooltip.style.left = (rect.left + rect.width / 2) + 'px';
    tooltip.style.top = (rect.top - 45) + 'px';
    tooltip.classList.add('visible');
  }, { passive: false });

  // --- Era cards (compact, image-driven) ---
  const eraImages = {
    1996: '../images/timeline/era-1996.png',
    2000: '../images/timeline/era-2001.png',
    2006: '../images/timeline/era-2008.png',
    2009: '../images/gallery/silhouette-guitars.jpg',
    2013: '../images/timeline/era-2013.png',
    2017: '../images/timeline/era-2016.png',
    2020: '../images/gallery/crowd-blue.jpg',
    2022: '../images/venues/sinclair.jpg',
    2026: null // archive — use placeholder with logo
  };

  erasData.forEach((era, i) => {
    const idx = monthIndex(era.year, 1);
    const xPos = xScale(idx) + 20;
    const topPos = ERA_SPAN_H + 16;

    const card = document.createElement('div');
    card.className = 'era-card';
    card.style.left = xPos + 'px';
    card.style.top = topPos + 'px';

    const imgSrc = eraImages[era.year] || era.image;
    let imageHtml;
    if (era.year === 2026) {
      // Special archive card with logo
      imageHtml = `<div class="era-card-image-placeholder" style="background:var(--surface-1);">
        <div style="text-align:center;">
          <div style="font-family:var(--font-display);font-size:1.5rem;color:var(--white);text-transform:uppercase;line-height:0.9;">Boston<span style="color:var(--amber);">Bands</span></div>
          <div style="font-family:var(--font-condensed);font-weight:600;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.3em;color:var(--text-dim);margin-top:0.5rem;">The Archive</div>
        </div>
      </div>`;
    } else if (imgSrc) {
      imageHtml = `<img class="era-card-image" src="${imgSrc}" alt="${era.title}" loading="lazy">`;
    } else {
      imageHtml = `<div class="era-card-image-placeholder"><span>Image coming soon</span></div>`;
    }

    // Truncate summary for compact cards
    const shortSummary = era.summary.length > 140
      ? era.summary.substring(0, era.summary.lastIndexOf(' ', 140)) + '...'
      : era.summary;

    card.innerHTML = `
      ${imageHtml}
      <div class="era-card-body">
        <div class="era-card-year">${era.year}</div>
        <div class="era-card-summary">${shortSummary}</div>
      </div>
    `;

    canvas.appendChild(card);
  });

  // --- Scene cards (interstitial images to fill gaps) ---
  const sceneCards = [
    { year: 1998, month: 6, src: '../images/venues/middle-east-up.jpg', caption: 'The Middle East, Central Square', top: '45%' },
    { year: 2002, month: 6, src: '../images/venues/paradise.jpg', caption: 'Paradise Rock Club', top: '50%' },
    { year: 2004, month: 6, src: '../images/gallery/guitar-closeup.jpg', caption: 'The scene, up close', top: '38%' },
    { year: 2007, month: 6, src: '../images/venues/club-passim.jpg', caption: 'Club Passim — open since 1958', top: '48%' },
    { year: 2011, month: 1, src: '../images/venues/great-scott.jpg', caption: 'Great Scott, Allston (1975–2020)', top: '42%' },
    { year: 2014, month: 6, src: '../images/gallery/crowd.jpg', caption: 'Boston Calling, City Hall Plaza', top: '48%' },
    { year: 2015, month: 6, src: '../images/venues/midway.jpg', caption: 'The Midway Café, Jamaica Plain', top: '38%' },
    { year: 2018, month: 6, src: '../images/gallery/radio-honey-live.jpg', caption: 'Radio Honey, live', top: '45%' },
    { year: 2019, month: 3, src: '../images/gallery/stu-lee-live.jpg', caption: 'Stu Lee, live', top: '38%' },
    { year: 2021, month: 6, src: '../images/gallery/silhouette-guitars.jpg', caption: 'Waiting for the music to return', top: '48%' },
    { year: 2023, month: 6, src: '../images/venues/sinclair.jpg', caption: 'The Sinclair, Cambridge', top: '42%' },
    { year: 2025, month: 1, src: '../images/gallery/parcek.jpg', caption: 'Peter Parcek', top: '48%' }
  ];

  sceneCards.forEach(sc => {
    const idx = monthIndex(sc.year, sc.month);
    const xPos = xScale(idx);

    const card = document.createElement('div');
    card.className = 'scene-card';
    card.style.left = xPos + 'px';
    card.style.top = sc.top;

    card.innerHTML = `
      <img src="${sc.src}" alt="${sc.caption}" loading="lazy">
      <div class="scene-card-caption">${sc.caption}</div>
    `;

    canvas.appendChild(card);
  });

  // --- Scroll-triggered reveals (era spans + era cards + scene cards) ---
  const eraCards = document.querySelectorAll('.era-card');
  const eraSpans = document.querySelectorAll('.era-span');
  const sceneEls = document.querySelectorAll('.scene-card');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, {
    root: container,
    threshold: 0.1
  });
  eraCards.forEach(card => observer.observe(card));
  eraSpans.forEach(span => observer.observe(span));
  sceneEls.forEach(card => observer.observe(card));

  // --- Navigation (carousel-style prev/next) ---
  function scrollToEra(index) {
    const era = erasData[index];
    const idx = monthIndex(era.year, 1);
    const targetX = xScale(idx) - container.clientWidth * 0.15;
    container.scrollTo({ left: Math.max(0, targetX), behavior: 'smooth' });
  }

  function getCurrentEraIndex() {
    const centerX = container.scrollLeft + container.clientWidth / 2;
    const monthIdx = Math.round(xScale.invert(centerX));
    const currentYear = allMonths[Math.max(0, Math.min(monthIdx, allMonths.length - 1))].year;
    let eraIdx = 0;
    for (let i = erasData.length - 1; i >= 0; i--) {
      if (currentYear >= erasData[i].year) { eraIdx = i; break; }
    }
    return eraIdx;
  }

  document.getElementById('navPrev').addEventListener('click', () => {
    scrollToEra(Math.max(0, getCurrentEraIndex() - 1));
  });

  document.getElementById('navNext').addEventListener('click', () => {
    scrollToEra(Math.min(erasData.length - 1, getCurrentEraIndex() + 1));
  });

  // --- Mouse wheel → horizontal scroll ---
  container.addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
      e.preventDefault();
      container.scrollLeft += e.deltaY;
    }
  }, { passive: false });

  // --- Keyboard navigation ---
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') container.scrollLeft += 200;
    if (e.key === 'ArrowLeft') container.scrollLeft -= 200;
  });

})();
</script>
</body>
</html>
