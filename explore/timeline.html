<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Timeline — BostonBands Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #050505;
  --surface-1: #0a0a0a;
  --surface-2: #111111;
  --surface-3: #1a1a1a;
  --surface-4: #222222;
  --text-dim: #777777;
  --text-muted: #999999;
  --text-body: #c0c0c0;
  --text-bright: #e8e8e8;
  --white: #f5f5f0;
  --amber: #d4a03a;
  --amber-glow: #e8b84a;
  --amber-dim: #8a6a2a;
  --font-display: 'Archivo Black', sans-serif;
  --font-condensed: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
  --font-handwritten: 'Dancing Script', cursive;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body);
  font-weight: 300;
  color: var(--text-body);
  background: var(--black);
  overflow: hidden;
  height: 100vh;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 10000;
  pointer-events: none;
  opacity: 0.03;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
a { color: var(--amber); text-decoration: none; }
a:hover { color: var(--amber-glow); }

/* === HEADER === */
.page-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 2000;
  padding: 1rem 1.5rem;
  background: rgba(5,5,5,0.92);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--surface-3);
}
.page-title {
  font-family: var(--font-display);
  font-size: 1rem;
  color: var(--white);
}
.page-title span { color: var(--amber); }
.page-back {
  font-family: var(--font-condensed);
  font-weight: 600;
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.page-back:hover { color: var(--amber); }

/* === NAV ARROWS === */
.nav-arrow {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  z-index: 1000;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--surface-4);
  background: rgba(10,10,10,0.7);
  backdrop-filter: blur(8px);
  color: var(--text-dim);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.nav-arrow:hover {
  border-color: var(--amber-dim);
  color: var(--amber);
  background: rgba(10,10,10,0.9);
}
.nav-arrow--left { left: 1rem; }
.nav-arrow--right { right: 1rem; }

/* === SCROLL CONTAINER === */
.scroll-container {
  position: absolute;
  top: 52px;
  left: 0;
  right: 0;
  bottom: 0;
  overflow-x: scroll;
  overflow-y: hidden;
  scrollbar-color: var(--surface-4) var(--black);
}
.scroll-container::-webkit-scrollbar { height: 6px; }
.scroll-container::-webkit-scrollbar-track { background: var(--black); }
.scroll-container::-webkit-scrollbar-thumb { background: var(--surface-4); border-radius: 3px; }

.timeline-canvas {
  position: relative;
  height: 100%;
}

/* === PARTICLE FIELD === */
.particle-canvas {
  position: absolute;
  bottom: 0;
  left: 0;
  pointer-events: none;
}

/* === MOOD GRADIENT === */
.mood-gradient {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 100%;
  pointer-events: none;
}

/* === YEAR LABELS (SVG) === */
.year-labels {
  position: absolute;
  bottom: 0;
  left: 0;
  pointer-events: none;
}

/* === ERA TRANSITION MARKERS === */
.era-crack {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  pointer-events: none;
  z-index: 1;
}
.era-crack::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 5%, var(--amber-dim) 30%, var(--amber) 50%, var(--amber-dim) 70%, transparent 95%);
  opacity: 0.3;
}
.era-crack::after {
  content: '';
  position: absolute;
  top: 0;
  left: -8px;
  right: -8px;
  bottom: 0;
  background: radial-gradient(ellipse at center, rgba(212,160,58,0.1) 0%, transparent 70%);
}

/* === ERA SPANS (top banner) === */
.era-span {
  position: absolute;
  top: 0;
  height: 32px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-bottom: 2px solid var(--amber-dim);
  border-left: 2px solid var(--amber-dim);
  opacity: 0;
  transition: opacity 0.5s var(--ease-out-expo);
}
.era-span.visible { opacity: 1; }
.era-span-label {
  font-family: var(--font-condensed);
  font-weight: 700;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--amber);
  white-space: nowrap;
}

/* === POLAROID CARDS === */
.polaroid {
  position: absolute;
  background: #f0ece4;
  padding: 10px 10px 36px 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 1px 4px rgba(0,0,0,0.3);
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.7s var(--ease-out-expo), transform 0.7s var(--ease-out-expo);
}
.polaroid.visible {
  opacity: 1;
  transform: translateY(0) rotate(var(--rot, 0deg));
}
.polaroid img {
  display: block;
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
}
.polaroid-caption {
  position: absolute;
  bottom: 6px;
  left: 10px;
  right: 10px;
  text-align: center;
  font-family: var(--font-handwritten);
  font-size: 0.85rem;
  color: #333;
  line-height: 1.2;
}
/* Era polaroids — wider with year + summary */
.polaroid--era {
  width: 280px;
  padding: 10px 10px 56px 10px;
}
.polaroid--era .polaroid-caption {
  bottom: 6px;
  font-size: 0.8rem;
}
.polaroid--era .polaroid-year {
  font-family: var(--font-display);
  font-size: 0.75rem;
  color: #555;
  letter-spacing: 0.05em;
  margin-bottom: 1px;
}
.polaroid--era .polaroid-summary {
  font-family: var(--font-body);
  font-size: 0.65rem;
  color: #666;
  line-height: 1.4;
  margin-top: 2px;
}
/* Scene polaroids — smaller */
.polaroid--scene {
  width: 200px;
}

/* === EXPLAINER CARD === */
.explainer-card {
  position: fixed;
  bottom: 1.5rem;
  left: 1.5rem;
  z-index: 1000;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid var(--surface-4);
  border-radius: 4px;
  padding: 1rem 1.25rem;
  max-width: 260px;
}
.explainer-title {
  font-family: var(--font-condensed);
  font-weight: 700;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 0.4rem;
}
.explainer-card p {
  font-size: 0.75rem;
  line-height: 1.5;
  color: var(--text-muted);
}

/* === MOBILE === */
@media (max-width: 768px) {
  .explainer-card { display: none; }
  .polaroid--era { width: 220px; padding: 8px 8px 44px 8px; }
  .polaroid--scene { width: 160px; padding: 6px 6px 28px 6px; }
  .polaroid-caption { font-size: 0.7rem; }
  .nav-arrow { width: 36px; height: 36px; font-size: 1rem; }
  .nav-arrow--left { left: 0.5rem; }
  .nav-arrow--right { right: 0.5rem; }
}
</style>
</head>
<body>

<header class="page-header">
  <div class="page-title">The <span>Timeline</span></div>
  <a href="../index.html#explore" class="page-back">&larr; Back</a>
</header>

<div class="scroll-container" id="scrollContainer">
  <div class="timeline-canvas" id="timelineCanvas">
  </div>
</div>

<div class="explainer-card">
  <div class="explainer-title">The Timeline</div>
  <p>Scroll through 30 years of Boston music. Each dot is a gig that happened.</p>
</div>

<button class="nav-arrow nav-arrow--left" id="navPrev" title="Previous era">&larr;</button>
<button class="nav-arrow nav-arrow--right" id="navNext" title="Next era">&rarr;</button>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(async function() {
  // --- Config ---
  const BAR_WIDTH = 18;
  const BAR_GAP = 2;
  const PARTICLE_ZONE_H = 0.25; // bottom 25% for particles
  const PADDING_LEFT = 60;
  const PADDING_RIGHT = 60;
  const ERA_SPAN_H = 32;

  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // --- Load data ---
  const [timelineData, erasData] = await Promise.all([
    d3.json('../data/timeline-extended.json'),
    d3.json('../data/eras.json')
  ]);

  // --- Build full month array (1996-01 through 2026-12) ---
  const dataMap = new Map();
  timelineData.forEach(d => dataMap.set(`${d.year}-${d.month}`, d));

  const allMonths = [];
  for (let y = 1996; y <= 2026; y++) {
    for (let m = 1; m <= 12; m++) {
      const key = `${y}-${m}`;
      allMonths.push(dataMap.get(key) || { year: y, month: m, gigs: 0, bands: 0, venues: 0 });
    }
  }

  // --- Dimensions ---
  const container = document.getElementById('scrollContainer');
  const viewportH = container.clientHeight;
  const particleH = Math.round(viewportH * PARTICLE_ZONE_H);
  const canvasW = PADDING_LEFT + allMonths.length * (BAR_WIDTH + BAR_GAP) + PADDING_RIGHT;

  const canvas = document.getElementById('timelineCanvas');
  canvas.style.width = canvasW + 'px';

  // --- Scales ---
  const xScale = d3.scaleLinear()
    .domain([0, allMonths.length - 1])
    .range([PADDING_LEFT, canvasW - PADDING_RIGHT]);

  const maxGigs = d3.max(allMonths, d => d.gigs);

  function monthIndex(year, month) {
    return (year - 1996) * 12 + (month - 1);
  }

  // --- Era end years ---
  const eraEndYears = [];
  for (let i = 0; i < erasData.length; i++) {
    eraEndYears.push(i < erasData.length - 1 ? erasData[i + 1].year : 2026);
  }

  // --- Era span banners ---
  erasData.forEach((era, i) => {
    const startIdx = monthIndex(era.year, 1);
    const endIdx = monthIndex(eraEndYears[i], 1);
    const xStart = xScale(startIdx);
    const xEnd = xScale(endIdx);

    const span = document.createElement('div');
    span.className = 'era-span';
    span.style.left = xStart + 'px';
    span.style.width = (xEnd - xStart) + 'px';
    span.innerHTML = `<span class="era-span-label">${era.year} &mdash; ${era.title}</span>`;
    canvas.appendChild(span);
  });

  // --- Mood gradient ---
  const moodCanvas = document.createElement('canvas');
  moodCanvas.className = 'mood-gradient';
  moodCanvas.width = canvasW;
  moodCanvas.height = viewportH;
  moodCanvas.style.width = canvasW + 'px';
  moodCanvas.style.height = viewportH + 'px';
  canvas.insertBefore(moodCanvas, canvas.firstChild);

  const eraMoods = [
    { year: 1996, color: [212, 160, 58] },
    { year: 2000, color: [180, 140, 60] },
    { year: 2006, color: [100, 130, 170] },
    { year: 2009, color: [60, 80, 140] },
    { year: 2013, color: [140, 100, 50] },
    { year: 2017, color: [220, 175, 60] },
    { year: 2020, color: [80, 30, 30] },
    { year: 2022, color: [160, 140, 60] },
    { year: 2026, color: [212, 160, 58] }
  ];

  function getMoodColor(monthIdx) {
    const year = 1996 + Math.floor(monthIdx / 12);
    let from = eraMoods[0], to = eraMoods[0];
    for (let i = 0; i < eraMoods.length - 1; i++) {
      if (year >= eraMoods[i].year && year < eraMoods[i + 1].year) {
        from = eraMoods[i]; to = eraMoods[i + 1]; break;
      }
      if (i === eraMoods.length - 2) { from = eraMoods[i + 1]; to = eraMoods[i + 1]; }
    }
    const t = Math.min(1, (year - from.year) / Math.max(1, to.year - from.year));
    return from.color.map((c, j) => Math.round(c + (to.color[j] - c) * t));
  }

  const moodCtx = moodCanvas.getContext('2d');
  for (let i = 0; i < allMonths.length; i++) {
    const x = xScale(i);
    const rgb = getMoodColor(i);
    const intensity = Math.min(0.12, 0.03 + (allMonths[i].gigs / maxGigs) * 0.09);
    const grad = moodCtx.createLinearGradient(0, viewportH, 0, viewportH * 0.4);
    grad.addColorStop(0, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${intensity})`);
    grad.addColorStop(1, 'transparent');
    moodCtx.fillStyle = grad;
    moodCtx.fillRect(x, 0, BAR_WIDTH + BAR_GAP, viewportH);
  }

  // --- Era transition cracks ---
  erasData.forEach((era, i) => {
    if (i === 0) return;
    const idx = monthIndex(era.year, 1);
    const crack = document.createElement('div');
    crack.className = 'era-crack';
    crack.style.left = xScale(idx) + 'px';
    canvas.appendChild(crack);
  });

  // --- Particle field (canvas-based) ---
  const particleCanvas = document.createElement('canvas');
  particleCanvas.className = 'particle-canvas';
  particleCanvas.width = canvasW;
  particleCanvas.height = particleH;
  particleCanvas.style.width = canvasW + 'px';
  particleCanvas.style.height = particleH + 'px';
  canvas.appendChild(particleCanvas);

  const pCtx = particleCanvas.getContext('2d');

  // Use a seeded random for reproducible particle layout
  function seededRandom(seed) {
    let s = seed;
    return function() {
      s = (s * 16807 + 0) % 2147483647;
      return s / 2147483647;
    };
  }

  const rng = seededRandom(42);

  // Generate particles — density proportional to sqrt of gig count
  allMonths.forEach((d, i) => {
    if (d.gigs === 0) return;

    const x = xScale(i);
    const slotW = BAR_WIDTH;
    // Number of particles: sqrt scale, max ~30 for densest months
    const count = Math.max(1, Math.round(Math.sqrt(d.gigs / maxGigs * 900)));
    const rgb = getMoodColor(i);

    for (let p = 0; p < count; p++) {
      const px = x + rng() * slotW;
      const py = particleH - 20 - rng() * (particleH - 40);
      const size = 1 + rng() * 2;
      const opacity = 0.3 + rng() * 0.5;

      pCtx.beginPath();
      pCtx.arc(px, py, size, 0, Math.PI * 2);
      pCtx.fillStyle = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${opacity})`;
      pCtx.fill();

      // Occasionally draw a connection line to a nearby particle
      if (rng() > 0.85 && count > 3) {
        const lx = x + rng() * slotW;
        const ly = particleH - 20 - rng() * (particleH - 40);
        pCtx.beginPath();
        pCtx.moveTo(px, py);
        pCtx.lineTo(lx, ly);
        pCtx.strokeStyle = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${opacity * 0.15})`;
        pCtx.lineWidth = 0.5;
        pCtx.stroke();
      }
    }
  });

  // --- Year labels SVG (over particles) ---
  const yearSvg = d3.select('#timelineCanvas').append('svg')
    .attr('class', 'year-labels')
    .attr('width', canvasW)
    .attr('height', particleH);

  allMonths.forEach((d, i) => {
    if (d.month === 1) {
      const x = xScale(i);
      yearSvg.append('line')
        .attr('x1', x).attr('y1', 0)
        .attr('x2', x).attr('y2', particleH - 20)
        .attr('stroke', '#222')
        .attr('stroke-width', 0.5);
      yearSvg.append('text')
        .attr('x', x + (BAR_WIDTH + BAR_GAP) * 6)
        .attr('y', particleH - 6)
        .attr('text-anchor', 'middle')
        .attr('fill', '#d4a03a')
        .attr('font-family', 'Barlow Condensed, sans-serif')
        .attr('font-weight', '600')
        .attr('font-size', '11px')
        .attr('opacity', 0.7)
        .text(d.year);
    }
  });

  // --- Polaroid cards: eras ---
  const eraImages = {
    1996: '../images/website/1996.png',
    2000: '../images/website/2001.png',
    2006: '../images/website/2008.png',
    2009: '../images/website/2012.png',
    2013: '../images/website/2013.png',
    2017: '../images/website/2016.png',
    2020: '../images/gallery/crowd-blue.jpg',
    2022: '../images/venues/sinclair.jpg',
    2026: '../images/website/2026.png'
  };

  // Slight rotation per card for natural scatter
  const eraRotations = [-2, 1.5, -1, 2, -1.5, 1, -2.5, 1.5, -1];

  erasData.forEach((era, i) => {
    const idx = monthIndex(era.year, 1);
    const xPos = xScale(idx) + 20;
    const topPos = ERA_SPAN_H + 16;

    const card = document.createElement('div');
    card.className = 'polaroid polaroid--era';
    card.style.left = xPos + 'px';
    card.style.top = topPos + 'px';
    card.style.setProperty('--rot', eraRotations[i] + 'deg');

    const imgSrc = eraImages[era.year] || era.image;
    const imageHtml = imgSrc
      ? `<img src="${imgSrc}" alt="${era.title}" loading="lazy">`
      : `<div style="width:100%;aspect-ratio:4/3;background:#ddd;"></div>`;

    const shortSummary = era.summary.length > 100
      ? era.summary.substring(0, era.summary.lastIndexOf(' ', 100)) + '...'
      : era.summary;

    card.innerHTML = `
      ${imageHtml}
      <div class="polaroid-caption">
        <div class="polaroid-year">${era.year}</div>
        ${era.title}
        <div class="polaroid-summary">${shortSummary}</div>
      </div>
    `;

    canvas.appendChild(card);
  });

  // --- Polaroid cards: scenes ---
  const sceneCards = [
    { year: 1998, month: 6, src: '../images/venues/middle-east-up.jpg', caption: 'The Middle East', top: '48%', rot: 3 },
    { year: 2002, month: 6, src: '../images/venues/paradise.jpg', caption: 'Paradise Rock Club', top: '52%', rot: -2 },
    { year: 2004, month: 6, src: '../images/gallery/guitar-closeup.jpg', caption: 'The scene, up close', top: '40%', rot: 1.5 },
    { year: 2007, month: 6, src: '../images/venues/club-passim.jpg', caption: 'Club Passim', top: '50%', rot: -3 },
    { year: 2011, month: 1, src: '../images/venues/great-scott.jpg', caption: 'Great Scott (1975-2020)', top: '44%', rot: 2 },
    { year: 2014, month: 6, src: '../images/gallery/crowd.jpg', caption: 'Boston Calling', top: '50%', rot: -1.5 },
    { year: 2015, month: 6, src: '../images/venues/midway.jpg', caption: 'The Midway Café', top: '40%', rot: 2.5 },
    { year: 2018, month: 6, src: '../images/gallery/radio-honey-live.jpg', caption: 'Radio Honey', top: '48%', rot: -2 },
    { year: 2019, month: 3, src: '../images/gallery/stu-lee-live.jpg', caption: 'Stu Lee', top: '40%', rot: 1 },
    { year: 2021, month: 6, src: '../images/gallery/silhouette-guitars.jpg', caption: 'Waiting...', top: '50%', rot: -3 },
    { year: 2023, month: 6, src: '../images/venues/sinclair.jpg', caption: 'The Sinclair', top: '44%', rot: 2 },
    { year: 2025, month: 1, src: '../images/gallery/parcek.jpg', caption: 'Peter Parcek', top: '50%', rot: -1.5 }
  ];

  sceneCards.forEach(sc => {
    const idx = monthIndex(sc.year, sc.month);
    const xPos = xScale(idx);

    const card = document.createElement('div');
    card.className = 'polaroid polaroid--scene';
    card.style.left = xPos + 'px';
    card.style.top = sc.top;
    card.style.setProperty('--rot', sc.rot + 'deg');

    card.innerHTML = `
      <img src="${sc.src}" alt="${sc.caption}" loading="lazy">
      <div class="polaroid-caption">${sc.caption}</div>
    `;

    canvas.appendChild(card);
  });

  // --- Scroll-triggered reveals ---
  const allPolaroids = document.querySelectorAll('.polaroid');
  const eraSpans = document.querySelectorAll('.era-span');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { root: container, threshold: 0.1 });
  allPolaroids.forEach(card => observer.observe(card));
  eraSpans.forEach(span => observer.observe(span));

  // --- Navigation ---
  function scrollToEra(index) {
    const era = erasData[index];
    const idx = monthIndex(era.year, 1);
    const targetX = xScale(idx) - container.clientWidth * 0.15;
    container.scrollTo({ left: Math.max(0, targetX), behavior: 'smooth' });
  }

  function getCurrentEraIndex() {
    const centerX = container.scrollLeft + container.clientWidth / 2;
    const monthIdx = Math.round(xScale.invert(centerX));
    const currentYear = allMonths[Math.max(0, Math.min(monthIdx, allMonths.length - 1))].year;
    let eraIdx = 0;
    for (let i = erasData.length - 1; i >= 0; i--) {
      if (currentYear >= erasData[i].year) { eraIdx = i; break; }
    }
    return eraIdx;
  }

  document.getElementById('navPrev').addEventListener('click', () => {
    scrollToEra(Math.max(0, getCurrentEraIndex() - 1));
  });
  document.getElementById('navNext').addEventListener('click', () => {
    scrollToEra(Math.min(erasData.length - 1, getCurrentEraIndex() + 1));
  });

  // --- Parallax: scene polaroids drift slower ---
  const scenePolaroids = document.querySelectorAll('.polaroid--scene');
  container.addEventListener('scroll', () => {
    const scrollLeft = container.scrollLeft;
    const offset = scrollLeft * 0.15;
    scenePolaroids.forEach(el => {
      const rot = el.style.getPropertyValue('--rot');
      el.style.transform = el.classList.contains('visible')
        ? `translateX(${offset}px) rotate(${rot})`
        : `translateX(${offset}px) translateY(20px)`;
    });
  });

  // --- Mouse wheel → horizontal scroll ---
  container.addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
      e.preventDefault();
      container.scrollLeft += e.deltaY;
    }
  }, { passive: false });

  // --- Keyboard navigation ---
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') container.scrollLeft += 200;
    if (e.key === 'ArrowLeft') container.scrollLeft -= 200;
  });

})();
</script>
</body>
</html>
